<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brandname — Marketplace</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>

    <!-- ============================================
         BENSON — Navbar, Hero, Categories
         Files: navbar.css | hero.css | categories.css
    ============================================ -->

    <!-- NAVBAR -->
    <nav id="navbar">
      <!-- Top bar: logo, search, icons -->
      <!-- Bottom bar: category links, location -->
    </nav>

    <!-- HERO -->
    <section id="hero">
      <!-- Left: category sidebar -->
      <!-- Center: trending banner -->
      <!-- Right: promo banner -->
    </section>

    <!-- CATEGORIES -->
    <section id="categories">
      <!-- Category pill links row -->
    </section>


    <!-- ============================================
         NELSON — Deals & Offers, Home & Outdoor
         Files: deals.css | outdoor.css
    ============================================ -->

    <!-- DEALS AND OFFERS -->
    <section id="deals">
      <!-- Left: title + countdown timer -->
      <!-- Right: 5 product cards in a row -->
    </section>

    <!-- HOME AND OUTDOOR -->
    <section id="outdoor">
      <!-- Left: banner with title and explore button -->
      <!-- Right: 4x2 grid of product cards -->
    </section>


    <!-- ============================================
         OGO — Consumer Electronics and Gadgets
         File: electronics.css
    ============================================ -->

    <!-- ELECTRONICS AND GADGETS -->
    <section id="electronics">
      <!-- Left: banner with title and explore button -->
      <!-- Right: 4x2 grid of product cards -->
    </section>


    <!-- ============================================
         INI — Recommended Items
         File: recommended.css
    ============================================ -->

    <!-- RECOMMENDED ITEMS -->
    <section id="recommended">
      <!-- Section title -->
      <!-- 5x2 grid of product cards with price, rating, name -->
    </section>


    <!-- ============================================
         FRANK — Call to Action
         File: cta.css
    ============================================ -->

    <!-- CTA BANNER -->
    <section id="cta">
      <div class="cta-bg">
        <img src="assets/cta-bg.jpg" alt="Call to Action Background">
      </div>

    <div class="cta-content">
      <h1>An easy way to send<br>requests to all suppliers</h1>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt.</p>
    </div>

    <div class="cta-card">
      <h2>Send quote to suppliers</h2>

      <input type="text" placeholder="What item you need?" >

      <textarea placeholder="Type more details"></textarea>

      <div class="cta-qty">
        <input type="text" placeholder="Qty" >
        <select>
          <option>Pcs</option>
        </select>
      </div>

      <button class="cta-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 8 16 12 12 16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Send Inquiry
      </button>
    </div>
      <!-- Left: headline, subtext, person image -->
      <!-- Right: send inquiry form -->
    </section>


    <!-- ============================================
         OBAMA — Footer
         File: footer.css
    ============================================ -->

    <!-- FOOTER -->
    <footer id="footer">
      <!-- 5 column links: Company, Buyers, Help, Service, Language -->
      <!-- Bottom bar: app store buttons, social icons, copyright -->
    </footer>


    <script src="js/main.js"></script>

  </body>
</html>
